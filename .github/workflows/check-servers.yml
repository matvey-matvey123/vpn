name: Check Servers

on:
  schedule:
    - cron: '0 */1 * * *'  # Каждые 1 часов
  workflow_dispatch:  # Ручной запуск

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Check servers
        run: python check.py
        
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add -A
          git commit -m "Update working servers" || exit 0
          git push
