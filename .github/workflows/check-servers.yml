name: Check Servers

on:
  schedule:
    - cron: '* * * * *'  # Каждую минуту
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - run: pip install requests
      
      - run: python check.py
      
      - run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add working.txt
          git commit -m "update" || true
          git push || true
